<!DOCTYPE html>
<html>

<head>
    <title>レシピ追加</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</head>
<body>
    <div class="form-container">
    <nav class="breadcrumb">
        <a href="/">ホーム</a> <span>&gt;</span> <a href="/recipes">レシピ一覧</a> <span>&gt;</span> レシピ追加
    </nav>
    <h1>レシピを追加する</h1>

    <form action="/recipes/add" method="POST" class="recipe-form">
        <div class="form-section">
            <label class="main-label">レシピ名</label>
            <input type="text" name="recipe_name" class="input-full" placeholder="例：肉じゃが" required>
        </div>

        <div class="form-section">
            <label class="main-label">材料</label>
            <div id="ingredients" class="ingredients-list-container">
                <div class="ingredient-row">
                    {% if error %}
                        <p style="color: red;">{{ error }}</p>
                    {% endif %}
                    <input type="text" name="ingredient_name" placeholder="材料名" required>
                    <input type="number" name="quantity" placeholder="数量" step="0.1" required>
                    <input type="text" name="unit" placeholder="単位" required>
                    <button type="button" class="btn-ingredient-delete" onclick="this.parentElement.remove()">削除</button>
                </div>
            </div>
            <button type="button" onclick="addIngredient()" class="btn-outline-add">+ 材料を追加</button>
        </div>

        <div class="form-section">
            <label class="main-label">作り方・メモ</label>
            <textarea name="process" placeholder="1.野菜を切る&#10;2.炒める・・・" rows="5"></textarea>
        </div>

        <div class="form-grid-settings">
            <div class="form-section">
                <label class="main-label">時間帯</label>
                <div class="checkbox-wrapper">
                    <label><input type="checkbox" name="time_category" value="朝">朝</label>
                    <label><input type="checkbox" name="time_category" value="昼">昼</label>
                    <label><input type="checkbox" name="time_category" value="夜">夜</label>
                </div>
            </div>
            <div class="form-section">
                <label class="main-label">カテゴリー</label>
                <div class="checkbox-wrapper">
                    <label><input type="checkbox" name="dish_category" value="主菜">主菜</label>
                    <label><input type="checkbox" name="dish_category" value="副菜">副菜</label>
                    <label><input type="checkbox" name="dish_category" value="汁物">汁物</label>
                </div>
            </div>
        </div>

        <div class="form-footer">
            <button type="submit" class="button-green submit-large">レシピを保存する</button>
        </div>
    </form>

    <script>
        function addIngredient(){
            const div = document.createElement("div");
            div.className = "ingredient-row";
            div.innerHTML = `
                <input type="text" name="ingredient_name" placeholder="材料名" required>
                <input type="number" name="quantity" placeholder="数量" step="0.1" required>
                <input type="text" name="unit" placeholder="単位" required>
                <button type="button" class="btn-ingredient-delete" onclick="this.parentElement.remove()">削除</button>
            `;
            document.getElementById("ingredients").appendChild(div);
        }
    </script>
    </div>

</body>

</html>
